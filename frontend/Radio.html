<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DJ Radio Console</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .scanline {
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }

        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 211, 238, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); }
        }
        .ai-pulse { animation: pulse-cyan 2s infinite; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

    <header class="border-b border-zinc-800 p-4 mb-8 bg-zinc-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter italic bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                RADIO AI LOCAL <span class="text-xs font-mono text-zinc-500 uppercase not-italic ml-2">v1.0 Beta</span>
            </h1>
            <div class="flex items-center gap-4">
                <span class="flex h-3 w-3 rounded-full bg-emerald-500 ai-pulse"></span>
                <span class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Ollama Online</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-12 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <section class="lg:col-span-7 space-y-6">
            

            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 shadow-2xl overflow-hidden relative group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                    <svg width="100" height="100" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </div>
                
                <h2 class="text-zinc-500 text-xs font-bold uppercase tracking-[0.2em] mb-4">On Air / Icecast Stream</h2>
                <div class="flex flex-col gap-6">
                    <div class="flex items-center gap-6">
                        <div class="w-20 h-20 bg-gradient-to-br from-blue-600 to-indigo-900 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/20">
                            <span class="text-3xl animate-bounce">📻</span>
                        </div>
                        <div>
                            <h3 class="text-2xl font-bold">AI Curator Session</h3>
                            <p class="text-zinc-400 text-sm mono">Host: Chatterbox TTS</p>
                        </div>
                    </div>
                    
                    <audio controls class="w-full h-12 brightness-90 contrast-125 rounded-lg">
                        <source src="http://localhost:8000/radio.mp3" type="audio/mpeg">
                    </audio>
                </div>
            </div>

            
        </section>
    </main>

    <footer class="container mx-auto px-4 py-8 border-t border-zinc-900 text-center text-zinc-600 text-xs">
        Proiectat cu HTMX + Tailwind + Ollama | Procesare locală C++
    </footer>

</body>
</html>
